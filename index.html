<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Achadinhos | Shopee & ML</title>
    <style>
        /* Reset para evitar quebras de layout */
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            -webkit-tap-highlight-color: transparent;
        }

        :root {
            --primary: #ee4d2d;
            --bg: #f8f9fa;
            --text: #333;
            --shadow: 0 4px 12px rgba(0,0,0,0.08);
        }

        body { 
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background: var(--bg); 
            color: var(--text);
            line-height: 1.5;
            overflow-x: hidden; /* Impede o arrasto para o lado */
        }

        header { 
            background: linear-gradient(135deg, #ee4d2d, #ff7337); 
            color: white; 
            padding: 50px 20px 60px; 
            text-align: center;
            border-bottom-left-radius: 40px; 
            border-bottom-right-radius: 40px;
        }

        header h1 { font-size: 1.8rem; margin-bottom: 8px; }
        header p { font-size: 0.9rem; opacity: 0.9; }

        .search-container { 
            margin: -30px auto 0; 
            padding: 0 20px;
            max-width: 600px; 
        }
        
        #searchInput { 
            width: 100%; 
            padding: 18px 25px; 
            border-radius: 15px; 
            border: none; 
            box-shadow: 0 10px 25px rgba(0,0,0,0.1);
            font-size: 16px; 
            outline: none;
            appearance: none;
        }

        .grid { 
            display: grid; 
            grid-template-columns: repeat(2, 1fr); /* Dois por linha no celular */
            gap: 12px; 
            padding: 20px; 
            max-width: 1200px; 
            margin: 0 auto;
        }

        /* No computador, mostra 4 por linha */
        @media (min-width: 768px) {
            .grid { grid-template-columns: repeat(auto-fill, minmax(250px, 1fr)); gap: 20px; }
        }

        .card { 
            background: #fff; 
            border-radius: 12px; 
            padding: 12px; 
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            box-shadow: var(--shadow);
            border: 1px solid #eee;
        }

        .card img { 
            width: 100%; 
            aspect-ratio: 1/1; /* Garante que a imagem seja sempre quadrada */
            object-fit: contain; 
            border-radius: 8px;
            margin-bottom: 10px;
        }

        .card h3 { 
            font-size: 0.85rem; 
            margin-bottom: 12px; 
            height: 40px; 
            overflow: hidden;
            display: -webkit-box;
            -webkit-line-clamp: 2;
            -webkit-box-orient: vertical;
            color: #444;
        }

        .btn { 
            background: var(--primary); 
            color: white; 
            text-decoration: none; 
            text-align: center;
            padding: 10px 5px; 
            border-radius: 8px; 
            font-weight: bold; 
            font-size: 0.8rem;
            transition: transform 0.2s;
        }

        .btn:active { transform: scale(0.95); }

        #loading, #noResults { 
            text-align: center; 
            padding: 40px; 
            font-size: 0.9rem; 
            color: #888; 
        }
        
        .hidden { display: none; }
    </style>
</head>
<body>

<header>
    <h1>🛍️ Melhores Achadinhos</h1>
    <p>Encontre o link do vídeo que você viu no TikTok/Insta</p>
</header>

<div class="search-container">
    <input type="text" id="searchInput" placeholder="Digite o que você procura... (ex: garrafa)" onkeyup="filterProducts()">
</div>

<div id="loading">Carregando ofertas fresquinhas...</div>
<div id="noResults" class="hidden">Nenhum produto encontrado. 😕</div>

<main id="productGrid" class="grid"></main>

<script>
    // 1. COLE O LINK DO SEU CSV PUBLICADO AQUI EMBAIXO:
    const SHEET_CSV_URL = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vRjNddnYmeOdUp2isNAl1hDusqSx1gOtrQZYS6Sjojxy-mkAxOI8UFqDP-Jh4aPRd18CS6ndUmwQZbW/pub?gid=0&single=true&output=csv';

    let allProducts = [];

    async function fetchData() {
        try {
            const response = await fetch(SHEET_CSV_URL);
            const data = await response.text();
            
            // Converte CSV para Array de Objetos
            const rows = data.split('\n').slice(1);
            allProducts = rows.map(row => {
                const cols = row.split(',');
                return {
                    nome: cols[0]?.trim(),
                    imagem: cols[1]?.trim(),
                    link: cols[2]?.trim(),
                    tags: cols[3]?.trim()?.toLowerCase() || ""
                };
            }).filter(p => p.nome && p.link);

            document.getElementById('loading').classList.add('hidden');
            render(allProducts);
        } catch (error) {
            document.getElementById('loading').innerText = "Erro ao carregar dados. Verifique o link da planilha.";
        }
    }

    function render(list) {
        const grid = document.getElementById('productGrid');
        const noRes = document.getElementById('noResults');
        grid.innerHTML = '';
        
        if (list.length === 0) {
            noRes.classList.remove('hidden');
        } else {
            noRes.classList.add('hidden');
            list.forEach(p => {
                grid.innerHTML += `
                    <div class="card">
                        <img src="${p.imagem}" alt="${p.nome}">
                        <h3>${p.nome}</h3>
                        <a href="${p.link}" target="_blank" class="btn">VER PRODUTO</a>
                    </div>
                `;
            });
        }
    }

    function filterProducts() {
        const term = document.getElementById('searchInput').value.toLowerCase();
        const filtered = allProducts.filter(p => 
            p.nome.toLowerCase().includes(term) || 
            p.tags.includes(term)
        );
        render(filtered);
    }

    fetchData();
</script>

</body>
</html>
